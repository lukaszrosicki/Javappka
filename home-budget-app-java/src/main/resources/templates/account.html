<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konto</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container py-5">
    <div class="card mx-auto" style="max-width: 500px;">
        <div class="card-body">
            <h2 class="card-title text-center mb-3">Zarządzanie kontem</h2>
            <form th:action="@{/account/password}" method="post" class="mb-4">
                <div class="mb-2">
                    <input class="form-control" type="password" name="password" placeholder="Nowe hasło" required>
                </div>
                <button class="btn btn-primary w-100" type="submit">Zmień hasło</button>
            </form>
            <form th:action="@{/account/delete}" method="post">
                <button class="btn btn-danger w-100" type="submit">Usuń konto</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
