<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wydatki</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="d-flex">
    <nav class="flex-column flex-shrink-0 p-3 bg-light" style="width:200px;">
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item"><a th:href="@{/dashboard}" class="nav-link">Dashboard</a></li>
            <li><a th:href="@{/expenses}" class="nav-link active">Wydatki</a></li>
            <li><a th:href="@{/incomes}" class="nav-link">Dochody</a></li>
            <li><a th:href="@{/account}" class="nav-link">Konto</a></li>
        </ul>
    </nav>
<div class="container-fluid py-4">
    <div class="card mb-3">
        <div class="card-body">
            <h3 class="card-title">Dodaj wydatek</h3>
            <form th:action="@{/expenses}" method="post" class="row g-2" th:object="${expense}">
                <div class="col-md-3">
                    <select class="form-select" th:field="*{category}" required>
                        <option th:each="c : ${T(com.example.homebudget.model.ExpenseCategory).values()}" th:value="${c}" th:text="${c}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="number" step="0.01" th:field="*{amount}" class="form-control" placeholder="Kwota" required>
                </div>
                <div class="col-md-3">
                    <input type="date" th:field="*{date}" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-primary w-100" type="submit">Dodaj</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <h3 class="card-title">Lista wydatków</h3>
            <table class="table">
                <thead>
                <tr>
                    <th>ID</th><th>Kategoria</th><th>Data</th><th>Kwota</th><th>Komentarz</th><th>Akcje</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="e : ${expenses}">
                    <td><a th:href="@{/expenses/{id}(id=${e.id})}" th:text="${e.id}"></a></td>
                    <td th:text="${e.category}"></td>
                    <td th:text="${e.date}"></td>
                    <td th:text="${e.amount}"></td>
                    <td th:text="${e.notes}"></td>
                    <td>
                        <a th:href="@{/expenses/{id}(id=${e.id})}" class="btn btn-sm btn-secondary">Edytuj</a>
                        <form th:action="@{/expenses/{id}(id=${e.id})}" method="post" class="d-inline">
                            <input type="hidden" name="_method" value="delete"/>
                            <button class="btn btn-sm btn-danger" type="submit">Usuń</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
