<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wydatki</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container py-4">
    <div class="card mb-3">
        <div class="card-body">
            <h3 class="card-title">Dodaj wydatek</h3>
            <form id="expenseForm" class="row g-2">
                <div class="col-md-3">
                    <select id="expenseCategory" class="form-select" required>
                        <option selected disabled>Kategoria</option>
                        <option>FOOD</option>
                        <option>BILLS</option>
                        <option>RENT</option>
                        <option>TRANSPORT</option>
                        <option>ENTERTAINMENT</option>
                        <option>HEALTH</option>
                        <option>DEBT</option>
                        <option>CLOTHES</option>
                        <option>HOLIDAYS</option>
                        <option>SUBSCRIPTIONS</option>
                        <option>CAR</option>
                        <option>OTHER</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="number" step="0.01" id="expenseAmount" class="form-control" placeholder="Kwota" required>
                </div>
                <div class="col-md-3">
                    <input type="date" id="expenseDate" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-primary w-100" type="submit">Dodaj</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <h3 class="card-title">Lista wydatków</h3>
            <ul class="list-group" id="expenseList"></ul>
        </div>
    </div>

    <nav class="mt-3">
        <a href="/dashboard" class="me-2">Dashboard</a>
        <a href="/incomes" class="me-2">Dochody</a>
        <a href="/logowanie">Logowanie</a>
    </nav>
</div>
<script src="script.js"></script>
</body>
</html>
