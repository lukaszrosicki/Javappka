<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejestracja</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container py-5">
    <div class="card mx-auto" style="max-width: 400px;">
        <div class="card-body">
            <form id="registerForm">
                <h2 class="card-title text-center mb-3">Załóż konto</h2>
                <input class="form-control mb-2" type="text" id="regEmail" placeholder="Email" required>
                <input class="form-control mb-2" type="password" id="regPassword" placeholder="Hasło" required>
                <button class="btn btn-success w-100" type="submit">Zarejestruj</button>
                <p id="register-msg" class="text-danger mt-2" style="display:none;"></p>
            </form>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
