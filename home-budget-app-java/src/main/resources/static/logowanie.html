<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container py-5">
        <div class="card mx-auto" style="max-width: 400px;">
            <div class="card-body">
                <form method="post" action="/logowanie">
                    <h2 class="card-title text-center mb-3">Logowanie</h2>
                    <input class="form-control mb-2" type="text" name="username" placeholder="Email" required>
                    <input class="form-control mb-2" type="password" name="password" placeholder="Hasło" required>
                    <button class="btn btn-primary w-100" type="submit">Zaloguj się</button>
                </form>
                <div class="text-center mt-3">
                    <a href="/register">Załóż konto</a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
