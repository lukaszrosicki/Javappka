<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container py-4">
    <div class="mb-3 text-end">
        <a href="/account" class="btn btn-secondary">Konto</a>
    </div>
    <div class="card mb-4">
        <div class="card-body">
            <h1 class="card-title">Dashboard</h1>
            <nav>
                <a href="/expenses" class="me-2">Wydatki</a>
                <a href="/incomes" class="me-2">Dochody</a>
                <a href="/logowanie">Logowanie</a>
            </nav>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <h3 class="card-title">Podsumowanie</h3>
            <form id="summaryForm" class="row g-2 align-items-end">
                <div class="col-auto">
                    <input type="number" class="form-control" id="sumYear" placeholder="Rok" required>
                </div>
                <div class="col-auto">
                    <input type="number" class="form-control" id="sumMonth" placeholder="Miesiąc" required>
                </div>
                <div class="col-auto">
                    <button class="btn btn-primary" type="submit">Pokaż</button>
                </div>
            </form>
            <p class="mt-3" id="summaryResult"></p>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
