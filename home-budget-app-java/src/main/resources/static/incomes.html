<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dochody</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container py-4">
    <div class="card mb-3">
        <div class="card-body">
            <h3 class="card-title">Dodaj dochód</h3>
            <form id="incomeForm" class="row g-2">
                <div class="col-md-3">
                    <select id="incomeCategory" class="form-select" required>
                        <option selected disabled>Kategoria</option>
                        <option>SALARY</option>
                        <option>BONUS</option>
                        <option>DIVIDENDS</option>
                        <option>OTHER</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="number" step="0.01" id="incomeAmount" class="form-control" placeholder="Kwota" required>
                </div>
                <div class="col-md-3">
                    <input type="date" id="incomeDate" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-primary w-100" type="submit">Dodaj</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <h3 class="card-title">Lista dochodów</h3>
            <ul class="list-group" id="incomeList"></ul>
        </div>
    </div>

    <nav class="mt-3">
        <a href="/dashboard" class="me-2">Dashboard</a>
        <a href="/expenses" class="me-2">Wydatki</a>
        <a href="/logowanie">Logowanie</a>
    </nav>
</div>
<script src="script.js"></script>
</body>
</html>
